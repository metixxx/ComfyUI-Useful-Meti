[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "comfyui-generation-time"
version = "1.0.1"
description = "ComfyUI node that outputs workflow execution time"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Metixxx", email = "sharifi.3d@gmail.com"}]
keywords = ["comfyui", "timer", "generation-time"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
]

[project.urls]
Repository = "https://github.com/metixxx/ComfyUI-Generation-Time"

[tool.comfy]
PublisherId = "metixxx"
DisplayName = "Generation Time - Meti"
Icon = "https://raw.githubusercontent.com/metixxx/ComfyUI-Generation-Time/main/images/node-example.png"